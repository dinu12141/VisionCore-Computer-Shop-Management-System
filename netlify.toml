[build]
  base = ""
  publish = "dist/spa"
  command = "npm install && npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Stop MIME sniffing attacks
    X-Content-Type-Options = "nosniff"
    # Control referrer leakage
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable unnecessary browser features
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    # Content Security Policy
    # unsafe-inline for scripts/styles is required by Quasar's Vite build (injected chunks).
    # connect-src allows Supabase REST + Realtime WebSocket endpoints.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; object-src 'none'; base-uri 'self';"
    # Opt into HTTPS-only (1 year, include subdomains)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Block XSS in older browsers
    X-XSS-Protection = "1; mode=block"

# Cache static assets aggressively (hashed filenames are cache-bust-safe)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache the HTML shell (index.html references the hashed assets)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
